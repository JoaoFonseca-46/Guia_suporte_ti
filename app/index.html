<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Suporte - TI</title>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

    <div class="app-container">

        <aside class="sidebar">
            <div>
                <div class="sidebar-header">
                    <h1>Guia de Suporte</h1>
                    <span class="sidebar-subtitle">Tecnologia da Informação</span>
                </div>

                <nav class="menu">
                    <ul>
                        <li class="menu-item active" data-section="suporte">Suporte</li>
                        <li class="menu-item" data-section="sistemas">Sistemas</li>
                        <li class="menu-item" data-section="office">Office</li>
                    </ul>
                </nav>

                <div class="sidebar-divider"></div>

                <div class="message-area">
                    <h3>Dica da TI</h3>
                    <p id="mensagem-ti"></p>
                </div>
            </div>

            <div class="version-area">
                Versão 1.0.0
            </div>
        </aside>

        <main class="content">
            <div class="content-header">
                <h2 id="section-title">Suporte</h2>
                <p class="intro-text">
                    Utilize este guia para resolver problemas simples ou obter orientação antes de abrir um chamado.
                </p>
            </div>

            <section id="dynamic-content">
                <div class="coluna" id="coluna-esquerda"></div>
                <div class="coluna" id="coluna-direita"></div>
            </section>

        </main>

    </div>

    <script src="js/config.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/accordion-control.js"></script>
    <script src="js/navegacao.js"></script>
    <script src="js/app.js"></script>
    <script src="js/messages.js"></script>

</body>
</html>
